name: Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write # required by anthropics/claude-code-action for its GitHub auth flow

concurrency:
  group: security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@a9ac9eb3a874922a7e34246afae3914113c6626f # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Run `/security-review` against the diff for this pull request and
            post the findings as a single PR comment.

            For each finding, include:
              - Severity: critical, high, medium, low, or info
              - File and line reference
              - One-paragraph description and recommended fix

            Focus areas:
              - Injection (SQL, NoSQL, command, prototype pollution)
              - XSS — including unsafe URL schemes (`javascript:`, `data:`,
                `vbscript:`) in href/src fields. The repo uses `safeHref()` at
                `apps/web/src/lib/safeHref.ts` and `HttpUrl` at
                `packages/shared/src/schemas/common.ts`. Flag any new
                `z.string().url()` usage on user-supplied URLs and any raw
                `href={user_value}` rendering.
              - Authn / authz / IDOR
              - Secrets, hardcoded credentials, leaked tokens
              - Unsafe deserialization, SSRF, open redirects
              - Insecure crypto / weak randomness
              - Dependency-introduced vulnerabilities

            After posting the comment, write a structured summary to
            `findings.json` at the repository root using exactly this schema:

              {
                "findings": [
                  {
                    "severity": "critical|high|medium|low|info",
                    "file": "path/to/file.ts",
                    "line": 42,
                    "description": "short description"
                  }
                ]
              }

            If there are no findings, write `{"findings": []}`. The severity
            values must be lowercase. A follow-up workflow step will parse
            this file to gate the merge — your PR comment is for humans, the
            JSON file is the source of truth for the gate.

          claude_args: |
            --allowedTools "Write(findings.json),mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(rg:*),Bash(grep:*)"

      - name: Gate on high-severity findings
        if: always()
        run: |
          if [ ! -f findings.json ]; then
            echo "::error::Security review did not produce findings.json"
            exit 1
          fi
          HIGH=$(jq '[.findings[] | select(.severity=="high" or .severity=="critical")] | length' findings.json)
          echo "High/critical findings: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::Security review found $HIGH high/critical issue(s). See PR comment for details."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-findings
          path: findings.json
          retention-days: 30
