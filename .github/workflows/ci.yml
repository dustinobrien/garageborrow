name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        # vitest covers @axe-core via apps/web's LegalDocument.test.tsx;
        # any new violation on a covered page surfaces here.
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Chrome for Lighthouse
        # ubuntu-24.04 runners don't preinstall Chrome. Pinning here so the
        # Lighthouse step has a deterministic browser instead of relying on
        # whatever ships in the runner image.
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Lighthouse
        # Targets: 90+ Performance / 95+ Accessibility / 95+ Best Practices / 90+ SEO.
        # Thresholds are configured inside scripts/lighthouse.sh.
        run: ./scripts/lighthouse.sh

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouse/
          retention-days: 7
