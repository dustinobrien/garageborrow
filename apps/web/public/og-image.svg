<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8B833"/>
      <stop offset="55%" stop-color="#DAAF35"/>
      <stop offset="100%" stop-color="#B5A66B"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="55%" r="65%">
      <stop offset="55%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(26,26,26,0.45)"/>
    </radialGradient>
    <pattern id="grain" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="rgba(255,255,255,0)"/>
      <circle cx="1" cy="1" r="0.6" fill="rgba(26,26,26,0.06)"/>
      <circle cx="4" cy="3" r="0.5" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>
  <g transform="translate(80,140)">
    <text x="0" y="0" font-family="'Permanent Marker', 'Marker Felt', cursive" font-size="160" fill="#1A1A1A">Garage Borrow</text>
    <text x="6" y="100" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="56" fill="#1A1A1A">Lend what you have.</text>
    <text x="6" y="170" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="56" fill="#1A1A1A">Borrow what you need.</text>
    <text x="6" y="320" font-family="Inter, system-ui, sans-serif" font-size="32" fill="#2A2018">An open-source neighborhood gear-lending PWA.</text>
  </g>
  <g transform="translate(880,470)" opacity="0.85">
    <rect x="0" y="0" width="240" height="80" rx="40" fill="#1A1A1A"/>
    <text x="120" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="28" fill="#E8B833">github.com</text>
  </g>
</svg>
