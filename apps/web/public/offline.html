<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#E8B833" />
    <title>Offline · Lebanon Garage</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #faf7f0;
        color: #1a1a1a;
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #2a2018;
          color: #faf7f0;
        }
      }
      h1 {
        font-family: "Permanent Marker", cursive;
        color: #e8b833;
        font-size: 2.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        max-width: 28rem;
        opacity: 0.8;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.6rem 1.25rem;
        background: #e8b833;
        color: #1a1a1a;
        border: 0;
        border-radius: 0.5rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>No signal out here.</h1>
      <p>
        You're offline. Stuff you've already loaded should still work — try again when you've got
        bars.
      </p>
      <button onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
