version = 0.1

# AWS SAM CLI configuration for Garage Borrow.
# `sam deploy --guided` writes additional defaults here on first run.
# Region: us-east-2.

[default.global.parameters]
stack_name = "garageborrow-dev"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
region = "us-east-2"
profile = "default"
stack_name = "garageborrow-dev"
s3_prefix = "garageborrow-dev"
capabilities = "CAPABILITY_NAMED_IAM"
confirm_changeset = true
fail_on_empty_changeset = false
resolve_s3 = true
parameter_overrides = "Stage=dev"

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

# ─── prod profile (override with `sam deploy --config-env prod`) ───
[prod.deploy.parameters]
region = "us-east-2"
profile = "default"
stack_name = "garageborrow-prod"
s3_prefix = "garageborrow-prod"
capabilities = "CAPABILITY_NAMED_IAM"
confirm_changeset = true
fail_on_empty_changeset = false
resolve_s3 = true
parameter_overrides = "Stage=prod"
